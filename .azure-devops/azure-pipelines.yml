# Push to dev branch   → deploys to DEV workspace
# Merge PR to main     → deploys to PROD workspace
# Auth: OAuth M2M (service principal)

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: hp_dbr_secrets

stages:
  # --- PR to main → validate only, no deploy ---
  - stage: Validate
    displayName: "Validate (PR)"
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: ValidateBundle
        steps:
          - checkout: self

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t dev
            displayName: "Validate (dev)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle validate -t prod
            displayName: "Validate (prod)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

  # --- Push to dev branch → deploy to DEV, export Genie Spaces, commit back ---
  - stage: DeployDev
    displayName: "Deploy to DEV"
    dependsOn: []
    condition: |
      and(
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/dev')
      )
    jobs:
      - job: DevDeploy
        steps:
          - checkout: self
            persistCredentials: 'true'

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t dev
            displayName: "Validate (dev)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle deploy -t dev --auto-approve
            displayName: "Deploy to DEV workspace"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: pip install requests -q && python genie/deploy.py --target dev --export-all
            displayName: "Export all Genie Spaces from DEV"
            env:
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: |
              git config user.email "cicd-pipeline@azuredevops.com"
              git config user.name "CI/CD Pipeline"
              git add genie/spaces/ genie/deployed_spaces.json
              if git diff --cached --quiet; then
                echo "No Genie Space changes to commit."
              else
                git commit -m "[skip ci] Sync Genie Spaces from DEV"
                git push origin HEAD:dev
                echo "Committed updated Genie Space definitions."
              fi
            displayName: "Commit Genie Space exports back to repo"

  # --- Merge to main → deploy to PROD workspace ---
  - stage: DeployProd
    displayName: "Deploy to PROD"
    dependsOn: []
    condition: |
      and(
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: ProdDeploy
        steps:
          - checkout: self
            persistCredentials: 'true'

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t prod
            displayName: "Validate (prod)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle deploy -t prod --auto-approve
            displayName: "Deploy to PROD workspace"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: pip install requests -q && python genie/deploy.py --target prod
            displayName: "Deploy Genie Spaces (prod)"
            env:
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: |
              git config user.email "cicd-pipeline@azuredevops.com"
              git config user.name "CI/CD Pipeline"
              git add genie/deployed_spaces.json
              if git diff --cached --quiet; then
                echo "No new space IDs to commit."
              else
                git commit -m "[skip ci] Update prod Genie Space IDs"
                git push origin HEAD:main
                echo "Committed updated deployed_spaces.json with prod space IDs."
              fi
            displayName: "Commit prod space IDs back to repo"
