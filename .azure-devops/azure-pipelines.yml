# Push to dev branch   → deploys to DEV workspace
# Merge PR to main     → deploys to PROD workspace
# Auth: OAuth M2M (service principal)

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

pool:
  vmImage: "ubuntu-latest"

variables:
  - group: hp_dbr_secrets

stages:
  # --- PR to main → validate only, no deploy ---
  - stage: Validate
    displayName: "Validate (PR)"
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: ValidateBundle
        steps:
          - checkout: self

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t dev
            displayName: "Validate (dev)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle validate -t prod
            displayName: "Validate (prod)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

  # --- Push to dev branch → deploy to DEV, export Genie Spaces, commit back ---
  - stage: DeployDev
    displayName: "Deploy to DEV"
    dependsOn: []
    condition: |
      and(
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/dev')
      )
    jobs:
      - job: DevDeploy
        steps:
          - checkout: self
            persistCredentials: 'true'

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t dev
            displayName: "Validate (dev)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle deploy -t dev --auto-approve
            displayName: "Deploy to DEV workspace"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_DEV)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

  # --- Merge to main → deploy to PROD workspace ---
  - stage: DeployProd
    displayName: "Deploy to PROD"
    dependsOn: []
    condition: |
      and(
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - job: ProdDeploy
        steps:
          - checkout: self
            persistCredentials: 'true'

          - script: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
            displayName: "Install Databricks CLI"

          - script: databricks bundle validate -t prod
            displayName: "Validate (prod)"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)

          - script: databricks bundle deploy -t prod --auto-approve
            displayName: "Deploy to PROD workspace"
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST_PROD)
              DATABRICKS_CLIENT_ID: $(DATABRICKS_CLIENT_ID)
              DATABRICKS_CLIENT_SECRET: $(DATABRICKS_CLIENT_SECRET)